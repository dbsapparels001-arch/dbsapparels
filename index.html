<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBS POD Store</title>
    <style>
        :root {
            --primary: #111;
            --accent: #f59e0b;
            --bg: #f9fafb;
            --card-bg: #fff;
            --text: #1f2937;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; }
        header { background: var(--primary); color: #fff; padding: 1.5rem; text-align: center; }
        header h1 { font-size: 1.8rem; letter-spacing: 1px; color: var(--accent); margin-bottom: 0.3rem; }
        header p { font-size: 0.95rem; color: #d1d5db; max-width: 800px; margin: 0 auto; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-content { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .card-price { color: var(--accent); font-size: 1.1rem; font-weight: bold; margin-bottom: 1rem; }
        .btn { background: var(--accent); color: #000; border: none; padding: 0.75rem; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: auto; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; padding: 2rem; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); position: relative; }
        .modal-content h3 { margin-bottom: 1rem; font-size: 1.3rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 0.6rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6b7280; }
    </style>
</head>
<body>

    <header>
        <h1>DBS POD Store</h1>
        <p>Choose your preferred design, t-shirt colors, and size—at DBS we give customers the freewill to make their own preferences and that's why #everythingDope around us</p>
    </header>

    <div class="container">
        <div class="grid" id="product-grid">
            <!-- Products will load dynamically -->
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal" id="checkout-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h3 id="modal-product-title">Complete Order</h3>
            <form id="order-form" onsubmit="sendToWhatsApp(event)">
                <div class="form-group">
                    <label for="cust-name">Your Name</label>
                    <input type="text" id="cust-name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="cust-size">Size</label>
                    <select id="cust-size" required>
                        <option value="">Select Size</option>
                        <option value="S">Small (S)</option>
                        <option value="M">Medium (M)</option>
                        <option value="L">Large (L)</option>
                        <option value="XL">Extra Large (XL)</option>
                        <option value="XXL">2XL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cust-color">T-Shirt Color</label>
                    <select id="cust-color" required>
                        <option value="">Select Color</option>
                        <option value="Black">Black</option>
                        <option value="White">White</option>
                        <option value="Blue">Blue</option>
                        <option value="Grey">Grey</option>
                        <option value="Red">Red</option>
                        <option value="Green">Green</option>
                        <option value="Yellow">Yellow</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cust-qty">Quantity</label>
                    <input type="number" id="cust-qty" value="1" min="1" required>
                </div>
                <button type="submit" class="btn">Proceed to WhatsApp Order</button>
            </form>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, title: "Drake x Kanye Glow", price: "GHS 450", image: "dbs-pod-store-drake-kanye-glow.png" },
            { id: 2, title: "Fruit of the Loom", price: "GHS 400", image: "dbs-pod-store-fruit-of-the-loom.png" },
            { id: 3, title: "Golden Lion", price: "GHS 450", image: "dbs-pod-store-golden-lion.png" },
            { id: 4, title: "Green Eyes", price: "GHS 420", image: "dbs-pod-store-green-eyes.png" },
            { id: 5, title: "Lil Wayne Design", price: "GHS 450", image: "dbs-pod-store-lil-wayne-design.png" },
            { id: 6, title: "Purification", price: "GHS 450", image: "dbs-pod-store-purification.png" },
            { id: 7, title: "Rhythmic Heritage", price: "GHS 380", image: "dbs-pod-store-rhythmic-heritage.png" },
            { id: 8, title: "Rick Ross Hustler", price: "GHS 450", image: "dbs-pod-store-rickross-hustler.png" }
        ];

        let selectedProduct = null;

        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.title}">
                    <div class="card-content">
                        <div class="card-title">${p.title}</div>
                        <div class="card-price">${p.price}</div>
                        <button class="btn" onclick="openModal('${p.title}', '${p.price}')">Shop Now</button>
                    </div>
                </div>
            `;
        });

        function openModal(title, price) {
            selectedProduct = { title, price };
            document.getElementById('modal-product-title').innerText = `Order: ${title}`;
            document.getElementById('checkout-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('checkout-modal').classList.remove('active');
        }

        function sendToWhatsApp(e) {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const size = document.getElementById('cust-size').value;
            const color = document.getElementById('cust-color').value;
            const qty = document.getElementById('cust-qty').value;

            // REPLACE THE NUMBER BELOW WITH YOUR ACTUAL WHATSAPP NUMBER (include country code, e.g., 233XXXXXXXXX)
            const whatsappNumber = "233XXXXXXXXX"; 

            const message = `Hello DBS POD Store,%0AI want to place an order:%0A%0A*Product:* ${selectedProduct.title}%0A*Price:* ${selectedProduct.price}%0A*Color:* ${color}%0A*Size:* ${size}%0A*Quantity:* ${qty}%0A*Name:* ${name}`;
            
            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
